version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gelendzhik-backend
    restart: unless-stopped
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gelendzhik-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
