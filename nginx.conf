# nginx.conf — конфигурация для продакшн-сборки Geledzhik Map App
# Обслуживает собранный фронтенд (папка dist) и проксирует /api на backend FastAPI

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Отдаём собранный фронтенд (Vite build)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксируем все запросы /api на FastAPI backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Кэшируем статику подольше
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
